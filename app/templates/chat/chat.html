{% extends "layout/base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/chat.css">
{% endblock %}
{% block content %}

<div id="wrapper">
    <!-- Sidebar stânga (mobil: slide-in) -->
    <div id="sidebar-left" class="d-lg-block">
        <div class="p-4 border-bottom" style="border-color: var(--border) !important;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0 fw-semibold">Conversații</h6>
                <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" id="new-chat-btn">
                    <i class="bi bi-plus-lg"></i> Nou
                </button>
            </div>
        </div>
        <div id="session-list" class="list-group list-group-flush"></div>
    </div>

    <!-- Chat principal -->
    <div id="chat-container" class="d-flex flex-column h-100">



        <div id="chat-box" class="flex-grow-1 overflow-auto p-3 p-md-4"></div>

        <!-- Input jos -->
        <div class="border-top bg-body px-3 px-md-4 py-3">
            <form id="chat-form" class="d-flex align-items-end gap-2 gap-md-3">
                <button type="button"
                    class="btn btn-outline-primary rounded-pill px-3 d-flex align-items-center mb-1 shadow-sm"
                    id="ptt-voice-btn" title="Ține apăsat pentru a vorbi"
                    style="height: 46px; min-width: 60px; transition: all 0.2s ease;">
                    <i class="bi bi-mic-fill fs-5 mx-auto"></i>
                </button>

                <div class="input-group input-group-lg flex-grow-1">
                    <textarea id="user-input" class="form-control rounded-4 ps-4 pe-5" placeholder="Mesajul tau..."
                        autocomplete="off" autofocus rows="1"
                        style="resize: none; overflow-y: hidden; min-height: 46px; max-height: 150px;"></textarea>

                    <button type="submit" class="btn btn-primary rounded-pill px-4 ms-2 mb-1" style="height: 46px;">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </form>
        </div>

        <!-- Voice panel0 - nu mai este folosit dar il 
         pastram pentru ca il vom transforma intr-o zona de settings la momentul potrivit-->
        <div id="voice-panel" class="d-flex flex-column p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0">Voice Input</h5>
                <button class="btn btn-close btn-close-white" id="close-voice"></button>
            </div>
            <div class="flex-grow-1 d-flex flex-column justify-content-center align-items-center">
                <div class="display-1 mb-5" id="voice-icon">🎤</div>
                <div id="voice-transcript" class="lead text-center p-4 bg-black bg-opacity-25 rounded w-100">
                    Vorbește...
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="{{ url_for('static', path='js/app.js') }}"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <!-- adaugă limbajele de care ai nevoie -->



    {% endblock %}
