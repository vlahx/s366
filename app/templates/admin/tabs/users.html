<div class="card bg-body-tertiary border-0 shadow-sm mt-3">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table">
                <tr>
                    <th>Utilizator</th>
                    <th>Rol</th>
                    <th>Companie</th>
                    <th class="text-end">Acțiuni</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td>
                        <div class="fw-bold">{{ u.firstname }} {{ u.lastname }}</div>
                        <small class="text-body-secondary">@{{ u.username }}</small>
                    </td>
                    <td>
                        <span
                            class="badge {% if u.role == 'superadmin' %}bg-danger{% elif u.role == 'pending_admin' %}bg-warning text-dark{% else %}bg-primary{% endif %}">
                            {{ u.role }}
                        </span>
                    </td>
                    <td>{{ u.company_name or '<span class="text-muted">Fără companie</span>'|safe }}</td>
                    <td class="text-end">
                        {% if u.id != request.session.user_id %}
                        <a href="/admin/impersonate/{{ u.id }}"
                            class="btn btn-dark btn-sm rounded-pill px-3 shadow-sm border-0">
                            <i class="bi bi-person-bounding-box me-1"></i> Shadowing
                        </a>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
