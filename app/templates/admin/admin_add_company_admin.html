{% extends 'layout/base.html' %}

{% block title %}Adaugă Administrator Companie{% endblock %}

{% block content %}
<div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Adaugă Administrator Companie</h1>

    <div class="bg-white p-6 rounded-lg shadow-md">
        <form method="POST">
            <div class="mb-4">
                <label for="company" class="block text-gray-700 font-bold mb-2">Companie:</label>
                <select id="company" name="company_id"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    required>
                    <option value="">-- Selectează o companie --</option>
                    {% for company in companies %}
                    <option value="{{ company.id }}">{{ company.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label for="user" class="block text-gray-700 font-bold mb-2">Utilizator:</label>
                <select id="user" name="user_id"
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    required>
                    <option value="">-- Selectează un utilizator --</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.email }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex items-center justify-between">
                <button type="submit" class="btn btn-success ">
                    Asociază ca Administrator
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
