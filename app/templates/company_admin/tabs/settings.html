<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <h5 class="mb-4"><i class="bi bi-gear-wide-connected me-2"></i>Configurare Motor RAG</h5>

        <form action="/company_admin/dashboard/settings/save" method="POST">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label d-flex justify-content-between">
                        Temperatură (Creativitate)
                        <span class="badge bg-primary" id="tempValue">{{ settings.rag_temperature }}</span>
                    </label>
                    <input type="range" class="form-range" name="rag_temperature" min="0" max="1" step="0.1"
                        value="{{ settings.rag_temperature }}"
                        oninput="document.getElementById('tempValue').innerText = this.value">
                    <div class="form-text">0 = Strict/Tehnic, 1 = Creativ/Chatty.</div>
                </div>

                <div class="col-md-6">
                    <label class="form-label text-white">Top K (Chunks returnate)</label>
                    <input type="number" class="form-control bg-dark text-white border-secondary" name="rag_top_k"
                        value="{{ settings.rag_top_k }}" min="1" max="15">
                    <div class="form-text">Câte bucăți de manual să citească AI-ul odată.</div>
                </div>

                <div class="col-md-12">
                    <label class="form-label d-flex justify-content-between">
                        Prag de Similitudine (Threshold)
                        <span class="badge bg-primary" id="thresholdValue">{{ settings.rag_threshold }}</span>
                    </label>
                    <input type="range" class="form-range" name="rag_threshold" min="0.1" max="0.9" step="0.05"
                        value="{{ settings.rag_threshold }}"
                        oninput="document.getElementById('thresholdValue').innerText = this.value">
                    <div class="form-text">Cu cât e mai mare, cu atât trebuie să fie mai sigură potrivirea.</div>
                </div>

                <div class="col-12">
                    <label class="form-label text-white">Instrucțiuni Sistem (Personalitate)</label>
                    <textarea class="form-control bg-dark text-white border-secondary" name="system_prompt"
                        rows="3">{{ settings.system_prompt }}</textarea>
                </div>

                <div class="col-12 mt-4 text-end">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-save me-2"></i>Salvează Configurația
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
